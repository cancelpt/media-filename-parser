repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pylint-src
        name: pylint src (recursive)
        entry: python -m pylint src --recursive=y
        language: system
        pass_filenames: false
